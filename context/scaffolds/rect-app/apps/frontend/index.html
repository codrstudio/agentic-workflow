<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Scaffold</title>
    <meta name="description" content="Scaffold" />

    <!-- PWA -->
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scaffold" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Color theme -->
    <link id="color-theme-link" rel="stylesheet" href="/themes/default.css">
    <script>
      (function() {
        var link = document.getElementById('color-theme-link');
        var fixed = '%VITE_COLOR_THEME%';
        var t = (fixed && fixed !== '' && fixed.charAt(0) !== '%') ? fixed : null;
        if (!t) {
          try { t = localStorage.getItem('color-theme'); } catch(e) {}
        }
        if (t && link) link.href = link.href.replace(/[^/]+\.css$/, t + '.css');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
