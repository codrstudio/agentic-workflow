name: vibe-full-app
description: Pain-gain analysis → go/no-go → specs → implementação em waves
sprint: true

steps:
  - type: spawn-agent
    task: pain-gain-analysis

  - type: spawn-agent
    task: go-no-go
    schema:
      type: object
      properties:
        go:
          type: boolean
        reason:
          type: string
      required: [go, reason]
    stop_on: "r => !r.go"

  - type: spawn-agent
    task: derive-specs

  - type: spawn-agent
    task: derive-prps

  - type: spawn-agent
    task: plan-features

  - type: ralph-wiggum-loop
    task: vibe-code

  # - type: spawn-agent
  #   task: plan-e2e-tests

  # - type: ralph-wiggum-loop
  #   task: e2e-test
  #   features_file: test-cases.json

  - type: spawn-agent
    task: merge-worktree

  - type: stop-on-wave-limit

  - type: spawn-workflow
    workflow: vibe-full-app
