name: aw-${ENVIRONMENT}

# include:
#   - docker-compose.platform.yml

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: arc-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    networks:
      internal:
        aliases:
          - web.internal
      web_network:
      shared-net:
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${WEB_PORT}/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

networks:
  internal:
    driver: bridge
  web_network:
    external: true
  shared-net:
    external: true
